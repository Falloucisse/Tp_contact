<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <h1 class="text-center text-uppercase text-primary">Gestion Contact</h1>
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">Ajout Contact</div>
                    <div class="card-body">
                        <form action="">
                            <input type="text" id="indice" hidden>
                            <div class="form-group">
                                <label for="">Prenom</label>
                                <input type="text" name="prenom" id="prenom" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="">Nom</label>
                                <input type="text" name="nom" id="nom" class="form-control">
                            </div>
                            <div class="form-group">
                                <label for="">Telephone</label>
                                <input type="text" name="tel" id="tel" class="form-control">
                            </div>
                            <div class="mt-2">
                                <button class="btn btn-success btn-sm" type="button" id="btn-add">Ajouter</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="container mt-4 ">
                    <div class="input-group" mb-3>
                        <input type="text" class="form-control" id="search" placeholder="Rechercher">
                        <button class="btn btn-primary" type="button" id="btn-rech"><i
                                class="fa-solid fa-magnifying-glass"></i></button>
                    </div>
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>N°</th>
                                <th>Prenom</th>
                                <th>Nom</th>
                                <th>Telephone</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="liste_contact">

                        </tbody>
                    </table>
                </div>
                <div class="mt-2">
                    <button class="btn  btn-sm btn-outline-dark" type="button" id="btn-left" style="font-size: 15px;"><i
                            class="fa-solid fa-arrow-left"></i></button>
                </div>
                <div class="mt-2">
                    <button class="btn  btn-sm btn-outline-dark" type="button" id="btn-right"
                        style="font-size: 15px; margin-left: 29%; margin-top: -75px;"><i
                            class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
</body>

</html>
